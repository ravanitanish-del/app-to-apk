<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web2APK - Website to APK Converter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-mobile-android"></i> Web2APK</h1>
            <p>Convert Website to Android APK Instantly</p>
        </header>

        <div class="converter-card" id="converter">
            <div class="input-group">
                <label>🌐 Website URL</label>
                <input type="url" id="url" placeholder="https://example.com" value="">
            </div>

            <div class="row">
                <div class="input-group">
                    <label>📱 App Name</label>
                    <input type="text" id="name" value="My App">
                </div>
                <div class="input-group">
                    <label>📦 Package</label>
                    <input type="text" id="pkg" value="com.myapp.web">
                </div>
            </div>

            <button class="btn-primary" onclick="createAPK()">
                <i class="fas fa-rocket"></i> Generate APK
            </button>
        </div>

        <div class="success-card" id="success" style="display:none;">
            <i class="fas fa-check-circle"></i>
            <h2>✅ APK Ready!</h2>
            <a href="#" class="btn-download" id="download" download>📱 Download APK (15MB)</a>
            <button class="btn-secondary" onclick="reset()">New APK</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
